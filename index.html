<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Georgia CAD Pro</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    overflow-x: hidden;
}
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at left, rgba(255,0,0,0.15), transparent 50%),
                radial-gradient(circle at right, rgba(0,100,255,0.15), transparent 50%);
    z-index: -1;
}
.section {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 0 10%;
}
.gradient-text {
    font-size: 3.5em;
    background: linear-gradient(90deg, #00c6ff, #0072ff, #ff004c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}
.word span {
    opacity: 0;
    display: inline-block;
    transform: translateY(20px);
    transition: all 0.5s ease;
}
.word.active span {
    opacity: 1;
    transform: translateY(0);
}
.tablet-section {
    height: 200vh;
}
.tablet-wrapper {
    position: sticky;
    top: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}
.tablet {
    width: 700px;
    height: 500px;
    background: #111;
    border-radius: 40px;
    padding: 20px;
    box-shadow:
        0 0 40px rgba(255,0,0,0.3),
        0 0 80px rgba(0,100,255,0.3),
        0 20px 80px rgba(0,0,0,0.9);
    transform: scale(0.7);
    position: relative;
    overflow: hidden;
}
.glass {
    position: absolute;
    width: 200%;
    height: 100%;
    top: 0;
    left: -100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.15), transparent);
    transform: skewX(-20deg);
}
.screen {
    width: 100%;
    height: 100%;
    border-radius: 25px;
    overflow: hidden;
}
.screen img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.fade {
    opacity: 0;
    transform: translateY(60px);
    transition: all 1s ease;
}
.fade.active {
    opacity: 1;
    transform: translateY(0);
}
.stat {
    font-size: 2.5em;
    margin: 20px 0;
}
</style>
</head>

<body>

<div class="section fade">
    <div>
        <h1 class="gradient-text word">Georgia CAD Pro</h1>
        <h2>Power. Performance. Control.</h2>
    </div>
</div>

<div class="tablet-section">
    <div class="tablet-wrapper">
        <div class="tablet" id="tablet">
            <div class="glass" id="glass"></div>
            <div class="screen">
                <img src="https://i.imgur.com/SKwBuLY.png">
            </div>
        </div>
    </div>
</div>

<div class="section fade">
    <div>
        <h1 class="gradient-text">M5.</h1>
        <h2>Creator. Accelerator.</h2>

        <div class="stat" data-target="6.7">0</div>
        <p>Faster rendering performance</p>

        <div class="stat" data-target="4">0</div>
        <p>Faster AI image generation</p>
    </div>
</div>

<div class="section fade">
    <div>
        <h1 class="gradient-text">Georgia Intelligence.</h1>
        <h2>Works hard. You take it easy.</h2>
    </div>
</div>

<script>
const tablet = document.getElementById("tablet");
const glass = document.getElementById("glass");
const fades = document.querySelectorAll(".fade");
const stats = document.querySelectorAll(".stat");

document.querySelectorAll(".word").forEach(el => {
    let text = el.innerText.split("");
    el.innerHTML = text.map(letter => `<span>${letter}</span>`).join("");
});

function animateCount(el) {
    let target = parseFloat(el.getAttribute("data-target"));
    let count = 0;
    let step = target / 50;

    let interval = setInterval(() => {
        count += step;
        if (count >= target) {
            el.innerText = target + "x";
            clearInterval(interval);
        } else {
            el.innerText = count.toFixed(1);
        }
    }, 30);
}

window.addEventListener("scroll", () => {
    const scroll = window.scrollY;
    const maxScroll = document.body.scrollHeight - window.innerHeight;
    const progress = scroll / maxScroll;

    let scale = 0.7 + (progress * 0.6);
    let y = 100 - (progress * 300);
    tablet.style.transform = `scale(${scale}) translateY(${y}px)`;

    glass.style.left = (-100 + progress * 200) + "%";

    const trigger = window.innerHeight * 0.85;

    fades.forEach(el => {
        if (el.getBoundingClientRect().top < trigger) {
            el.classList.add("active");
        }
    });

    document.querySelectorAll(".word").forEach(el => {
        if (el.getBoundingClientRect().top < trigger) {
            el.classList.add("active");
        }
    });

    stats.forEach(stat => {
        if (stat.getBoundingClientRect().top < trigger && !stat.classList.contains("done")) {
            stat.classList.add("done");
            animateCount(stat);
        }
    });
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Georgia CAD</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    overflow-x: hidden;
}

/* Background glow */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at left, rgba(255,0,0,0.2), transparent 50%),
                radial-gradient(circle at right, rgba(0,100,255,0.2), transparent 50%);
    z-index: -1;
}

/* Sections */
.section {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 0 10%;
}

/* BIG text */
.gradient-text {
    font-size: 5em;
    background: linear-gradient(90deg, #00c6ff, #0072ff, #ff004c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

h2 {
    font-size: 2.5em;
}

p {
    font-size: 1.5em;
}

/* Tablet showcase */
.tablet-section {
    height: 150vh;
}

.tablet-wrapper {
    position: sticky;
    top: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.tablet {
    width: 900px;
    height: 550px;
    background: #111;
    border-radius: 30px;
    padding: 20px;
    box-shadow:
        0 0 60px rgba(255,0,0,0.4),
        0 0 120px rgba(0,100,255,0.4);
}

/* Screen */
.screen {
    width: 100%;
    height: 100%;
    border-radius: 20px;
    overflow: hidden;
}

.screen img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Fade animation */
.fade {
    opacity: 0;
    transform: translateY(60px);
    transition: all 1s ease;
}

.fade.active {
    opacity: 1;
    transform: translateY(0);
}

/* Stats */
.stat {
    font-size: 3em;
    margin: 20px 0;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="section fade">
    <div>
        <h1 class="gradient-text">Georgia CAD</h1>
        <h2>Next-Generation Dispatch System</h2>
        <p>Standalone • QBcore • ESX</p>
    </div>
</div>

<!-- CAD PREVIEW (THIS FIXES YOUR ISSUE) -->
<div class="tablet-section">
    <div class="tablet-wrapper">
        <div class="tablet">
            <div class="screen">
                <img src="https://i.imgur.com/SKwBuLY.png">
            </div>
        </div>
    </div>
</div>

<!-- FEATURES -->
<div class="section fade">
    <div>
        <h1 class="gradient-text">Features</h1>
        <p>Real-time dispatch system</p>
        <p>Unit tracking</p>
        <p>CAD records & logs</p>
        <p>Modern UI design</p>
    </div>
</div>

<!-- PERFORMANCE -->
<div class="section fade">
    <div>
        <h1 class="gradient-text">Performance</h1>

        <div class="stat" data-target="6.7">0</div>
        <p>Faster response times</p>

        <div class="stat" data-target="4">0</div>
        <p>Optimized systems</p>
    </div>
</div>

<script>
const fades = document.querySelectorAll(".fade");
const stats = document.querySelectorAll(".stat");

function animateCount(el) {
    let target = parseFloat(el.getAttribute("data-target"));
    let count = 0;
    let step = target / 50;

    let interval = setInterval(() => {
        count += step;
        if (count >= target) {
            el.innerText = target + "x";
            clearInterval(interval);
        } else {
            el.innerText = count.toFixed(1);
        }
    }, 30);
}

window.addEventListener("scroll", () => {
    const trigger = window.innerHeight * 0.85;

    fades.forEach(el => {
        if (el.getBoundingClientRect().top < trigger) {
            el.classList.add("active");
        }
    });

    stats.forEach(stat => {
        if (stat.getBoundingClientRect().top < trigger && !stat.classList.contains("done")) {
            stat.classList.add("done");
            animateCount(stat);
        }
    });
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Georgia CAD</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    overflow-x: hidden;
}

/* 🎥 VIDEO BACKGROUND */
.video-bg {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
    opacity: 0.25;
}

/* 🚔 POLICE LIGHT OVERLAY */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 100%;
    background: linear-gradient(90deg, rgba(255,0,0,0.2), transparent, rgba(0,100,255,0.2));
    animation: lights 6s linear infinite;
    z-index: -1;
}

@keyframes lights {
    0% { transform: translateX(-50%); }
    100% { transform: translateX(0%); }
}

/* Sections */
.section {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 0 10%;
}

/* BIG TEXT */
.gradient-text {
    font-size: 5em;
    background: linear-gradient(90deg, #00c6ff, #0072ff, #ff004c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

h2 { font-size: 2.5em; }
p { font-size: 1.4em; }

/* 🖱️ APPLE-STYLE TABLET */
.tablet-section {
    height: 200vh;
}

.tablet-wrapper {
    position: sticky;
    top: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.tablet {
    width: 900px;
    height: 550px;
    background: #111;
    border-radius: 30px;
    padding: 20px;
    box-shadow:
        0 0 80px rgba(255,0,0,0.5),
        0 0 120px rgba(0,100,255,0.5);
    transform: scale(0.6);
    transition: transform 0.2s ease;
}

.screen {
    width: 100%;
    height: 100%;
    border-radius: 20px;
    overflow: hidden;
}

.screen img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* 🎮 FADE / UI ANIMATIONS */
.fade {
    opacity: 0;
    transform: translateY(80px);
    transition: all 1s ease;
}

.fade.active {
    opacity: 1;
    transform: translateY(0);
}

/* Stats */
.stat {
    font-size: 3em;
    margin: 20px 0;
}
</style>
</head>

<body>

<!-- 🎥 VIDEO -->
<video autoplay muted loop class="video-bg">
    <source src="https://cdn.coverr.co/videos/coverr-police-car-lights-1584/1080p.mp4" type="video/mp4">
</video>

<!-- HERO -->
<div class="section fade">
    <div>
        <h1 class="gradient-text">Georgia CAD</h1>
        <h2>Next-Gen Dispatch System</h2>
        <p>Standalone • QBcore • ESX</p>
    </div>
</div>

<!-- 🖱️ CAD SHOWCASE -->
<div class="tablet-section">
    <div class="tablet-wrapper">
        <div class="tablet" id="tablet">
            <div class="screen">
                <img src="https://i.imgur.com/SKwBuLY.png">
            </div>
        </div>
    </div>
</div>

<!-- FEATURES -->
<div class="section fade">
    <div>
        <h1 class="gradient-text">Features</h1>
        <p>Real-time dispatch</p>
        <p>Unit tracking</p>
        <p>Logs & records</p>
        <p>Modern FiveM UI</p>
    </div>
</div>

<!-- PERFORMANCE -->
<div class="section fade">
    <div>
        <h1 class="gradient-text">Performance</h1>

        <div class="stat" data-target="6.7">0</div>
        <p>Faster response</p>

        <div class="stat" data-target="4">0</div>
        <p>Optimized systems</p>
    </div>
</div>

<script>
const tablet = document.getElementById("tablet");
const fades = document.querySelectorAll(".fade");
const stats = document.querySelectorAll(".stat");

function animateCount(el) {
    let target = parseFloat(el.getAttribute("data-target"));
    let count = 0;
    let step = target / 50;

    let interval = setInterval(() => {
        count += step;
        if (count >= target) {
            el.innerText = target + "x";
            clearInterval(interval);
        } else {
            el.innerText = count.toFixed(1);
        }
    }, 30);
}

window.addEventListener("scroll", () => {
    const scroll = window.scrollY;
    const maxScroll = document.body.scrollHeight - window.innerHeight;
    const progress = scroll / maxScroll;

    /* 🖱️ Apple zoom */
    let scale = 0.6 + (progress * 0.8);
    tablet.style.transform = `scale(${scale})`;

    /* Fade */
    const trigger = window.innerHeight * 0.85;

    fades.forEach(el => {
        if (el.getBoundingClientRect().top < trigger) {
            el.classList.add("active");
        }
    });

    stats.forEach(stat => {
        if (stat.getBoundingClientRect().top < trigger && !stat.classList.contains("done")) {
            stat.classList.add("done");
            animateCount(stat);
        }
    });
});
</script>

</body>
</html>
